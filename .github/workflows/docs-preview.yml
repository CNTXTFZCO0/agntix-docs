name: docs-preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build & validate preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint internal paths (CI defense layer 3)
        run: pnpm lint:internal

      - name: Validate OpenAPI spec
        run: |
          node -e "
          const spec = require('./openapi/agentix.json');
          if (!spec.openapi) { console.error('Missing openapi version'); process.exit(1); }
          if (!spec.info?.title) { console.error('Missing info.title'); process.exit(1); }
          console.log('OpenAPI spec OK —', Object.keys(spec.paths || {}).length, 'paths');
          "

      - name: Check broken links
        run: pnpm broken-links
        continue-on-error: true # Mintlify previews fall behind on outbound links sometimes

      - name: Comment preview URL
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            Mintlify will deploy a preview to `https://pr-${{ github.event.number }}.agntix.mintlify.app`
            (the Mintlify GitHub app handles the actual build).

            Preview deployments are served with `X-Robots-Tag: noindex` so they cannot be SEO-indexed.
          comment-tag: docs-preview
          mode: upsert
