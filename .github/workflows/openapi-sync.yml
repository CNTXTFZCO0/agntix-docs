name: openapi-sync

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: "0 3 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
    inputs:
      gateway_url:
        description: "Override GATEWAY_BASE_URL"
        required: false
        default: "https://api.agntix.ai"
  # Also re-sync when the gateway publishes a new release
  repository_dispatch:
    types: [gateway-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync OpenAPI from gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Sync OpenAPI spec
        env:
          GATEWAY_BASE_URL: ${{ github.event.inputs.gateway_url || 'https://api.agntix.ai' }}
        run: pnpm sync:openapi

      - name: Re-run internal-leak lint on the new spec
        run: pnpm lint:internal

      - name: Open a PR if the spec changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(docs): sync OpenAPI from gateway"
          title: "chore(docs): nightly OpenAPI sync"
          body: |
            Automated nightly sync of the public OpenAPI spec from the gateway at
            `${{ github.event.inputs.gateway_url || 'https://api.agntix.ai' }}`.

            **Reviewer checklist:**

            - [ ] Diff is limited to `openapi/agentix.json`.
            - [ ] No internal paths leaked (lint passed).
            - [ ] Any new endpoints have been confirmed customer-safe with the owning team
                  (update `ROUTE_AUDIT.md` if the answer is yes).

            Generated by `.github/workflows/openapi-sync.yml`.
          branch: chore/openapi-sync
          delete-branch: true
          labels: |
            documentation
            automated
